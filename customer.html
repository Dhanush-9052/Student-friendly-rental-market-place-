<!DOCTYPE html>
<html>
<head>
  <title>Customer Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ================= TOP BAR ================= -->
  <div class="dashboard-header">
    <div class="dashboard-title">
      Student Rental Hub
    </div>

    <div class="dashboard-user">
      Welcome, <span id="currentUser"></span>
    </div>
  </div>

  <!-- ================= NAV BAR ================= -->
  <div class="dashboard-nav">
    <button onclick="showItemsForRent()">Items</button>
    <button onclick="showMyRequests()">My Requests</button>
    <button onclick="showCustomerHistory()">Rental History</button>

    <button onclick="openCustomerNotifications()" class="notif-btn">
      Notifications
      <span id="notifBadge" class="notif-badge"></span>
    </button>

    <button onclick="showProfile()">Profile</button>
    <button onclick="logout()">Logout</button>
  </div>
  
  <!-- ================= CONTENT ================= -->
  <div class="dashboard-content">
    <div id="items"></div>
    <div id="reviewsSection" style="display:none;"></div>
    <div id="customerNotifications"></div>
    <!-- PROFILE SECTION -->
<div id="profileSection" style="display:none; margin-top:20px;">

  <h2 class="items-heading">My Profile</h2>

  <!-- VIEW MODE -->
  <div id="profileView">

    <p><strong>Name:</strong> <span id="profileName"></span></p>
    <p><strong>Phone:</strong> <span id="profilePhone"></span></p>
    <p><strong>Address:</strong> <span id="profileAddress"></span></p>
    <br>
    <button onclick="enableEditProfile()">Edit Profile</button>

  </div>

  <!-- EDIT MODE -->
  <div id="profileEdit" style="display:none;">

    <input type="text" id="editName" placeholder="Name"><br>
    <input type="text" id="editPhone" placeholder="Phone"><br>
    <input type="text" id="editAddress" placeholder="Address"><br><br>

    <button onclick="saveProfile()">Save</button>
    <button onclick="cancelEditProfile()">Cancel</button>

  </div>

</div>
  </div>

  <!-- RENT MODAL -->
  <div id="rentModal" class="modal-overlay" style="display:none;">
    <div class="modal-box">
      <h3>Rent Item</h3>

      <label>From Date</label>
      <input type="date" id="rentFrom">

      <label>To Date</label>
      <input type="date" id="rentTo">
      <p id="rentSummary"></p>

      <p id="rentDays"></p>
      <p id="rentAmount"></p>

      <button onclick="confirmRent()">Confirm Rent</button>
      <button onclick="closeRentModal()">Cancel</button>
    </div>
  </div>
  
  <!-- REVIEW MODAL -->
  <div id="reviewModal" class="modal-overlay" style="display:none;">
    <div class="modal-box">
      <h3>Review Product</h3>

      <label>Rating (1-5)</label>
      <input type="number" id="reviewRating" min="1" max="5">

      <label>Comment</label>
      <textarea id="reviewComment"></textarea>

      <button onclick="saveReview()">Save</button>
      <button onclick="closeReviewModal()">Cancel</button>
    </div>
  </div>
  <!-- Reviews Modal -->
<div id="reviewsModal" style="
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.5);
  justify-content:center;
  align-items:center;
">

  <div style="
    background:white;
    padding:20px;
    width:400px;
    border-radius:8px;
  ">
    <div id="reviewsContent"></div>

    <button onclick="closeReviewsModal()">Back</button>
  </div>

</div>
  <!-- ================= FIREBASE SCRIPT ================= -->
  <script type="module" src="script.js"></script>

</body>
</html>
