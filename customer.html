<!DOCTYPE html>
<html>
<head>
  <title>Customer Dashboard</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<!-- ================= HEADER ================= -->
<div class="top-header">

  <div class="header-left">
    <div class="menu-icon" onclick="toggleSidebar()">
  ☰
  <span id="menuNotifBadge" class="menu-badge"></span>
</div>
    <div class="header-title">Student Rental Hub</div>
  </div>

  <div class="header-right">
    Welcome back, <span id="currentUser"></span>
  </div>

</div>

<!-- ================= SIDEBAR ================= -->
<div id="sidebar" class="sidebar">

  <div class="sidebar-user">
    <div id="sidebarName">User Name</div>
    <div id="sidebarEmail">user@email.com</div>
  </div>

  <button class="menu-btn active" onclick="setActive(this); showItemsForRent()">
    <i class="fas fa-box"></i> Items
  </button>

  <button class="menu-btn" onclick="setActive(this); showMyRequests()">
    <i class="fas fa-clipboard-list"></i> My Requests
  </button>

  <button class="menu-btn" onclick="setActive(this); showCustomerHistory()">
    <i class="fas fa-clock-rotate-left"></i> Rental History
  </button>

  <button class="menu-btn" onclick="setActive(this); openCustomerNotifications()">
    <i class="fas fa-bell"></i> Notifications
    <span id="notifBadge" class="notif-badge"></span>
  </button>

  <button class="menu-btn" onclick="setActive(this); showProfile()">
    <i class="fas fa-user"></i> Profile
  </button>

  <button class="menu-btn" onclick="logout()">
    <i class="fas fa-right-from-bracket"></i> Logout
  </button>

</div>

<!-- ================= OVERLAY ================= -->
<div id="overlay" onclick="toggleSidebar()"></div>

<!-- ================= CONTENT ================= -->
<div class="dashboard-content">

  <div id="items"></div>
  <div id="reviewsSection" style="display:none;"></div>
  <div id="customerNotifications"></div>

  <!-- PROFILE -->
  <div id="profileSection" style="display:none; margin-top:20px;">

    <h2 class="items-heading">My Profile</h2>
    <br>

    <div id="profileView">
      <p><strong>Name:</strong> <span id="profileName"></span></p>
      <p><strong>Phone:</strong> <span id="profilePhone"></span></p>
      <p><strong>Address:</strong> <span id="profileAddress"></span></p>
      <br>
      <button onclick="enableEditProfile()">Edit Profile</button>
    </div>

    <div id="profileEdit" style="display:none;">

      <input type="text" id="editName" placeholder="Name"><br>
      <input type="text" id="editPhone" placeholder="Phone"><br>
      <input type="text" id="editAddress" placeholder="Address"><br><br>

      <button onclick="saveProfile()">Save</button>
      <button onclick="cancelEditProfile()">Cancel</button>

    </div>

  </div>

</div>


<!-- ================= RENT MODAL ================= -->

<div id="rentModal" class="modal-overlay" style="display:none;">

  <div class="modal-box">

    <h3>Rent Item</h3>

    <label>From Date</label>
    <input type="date" id="rentFrom">

    <label>To Date</label>
    <input type="date" id="rentTo">

    <p id="rentSummary"></p>

    <p id="rentDays"></p>

    <p id="rentAmount"></p>

    <button class="rent-btn" onclick="confirmRent()">Confirm Rent</button>
    <button onclick="closeRentModal()">Cancel</button>

  </div>

</div>


<script>

function toggleSidebar(){
  document.getElementById("sidebar").classList.toggle("open");
  document.getElementById("overlay").classList.toggle("show");
}

/* ACTIVE SIDEBAR */

function setActive(btn){

  let buttons = document.querySelectorAll(".menu-btn");

  buttons.forEach(b=>{
    b.classList.remove("active");
  });

  btn.classList.add("active");

  /* CLOSE SIDEBAR AFTER CLICK */

  document.getElementById("sidebar").classList.remove("open");
  document.getElementById("overlay").classList.remove("show");

}

</script>

<script type="module" src="script.js"></script>

</body>
</html>
