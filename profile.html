<!DOCTYPE html>
<html>
<head>
  <title>My Profile</title>
  <link rel="stylesheet" href="style.css">
</head>

<body class="profile-body">

<div class="profile-card">
  
  <h2>My Profile</h2>

  <!-- ================= VIEW MODE ================= -->
  <div id="viewProfile">

    <div style="display: flex; align-items: center; margin: 10px 0;">
      <label class="profile-label"><b>Name:</b></label>
      <span id="vname"
        style="flex: 1; padding: 5px; background: #f5f5f5; border-radius: 4px;">
        Loading...
      </span>
    </div>

    <div style="display: flex; align-items: center; margin: 10px 0;">
      <label class="profile-label"><b>Phone No:</b></label>
      <span id="vphone"
        style="flex: 1; padding: 5px; background: #f5f5f5; border-radius: 4px;">
        Loading...
      </span>
    </div>

    <div style="display: flex; align-items: center; margin: 10px 0;">
      <label class="profile-label"><b>Address:</b></label>
      <span id="vaddress"
        style="flex: 1; padding: 5px; background: #f5f5f5; border-radius: 4px;">
        Loading...
      </span>
    </div>

    <button onclick="editMyProfile()" style="width: 100%; margin-top: 20px;">
      Edit Profile
    </button>
  </div>

  <!-- ================= EDIT MODE ================= -->
  <div id="editProfile" style="display:none; margin-top:20px;">

    <div style="display: flex; align-items: center; margin: 10px 0;">
      <label class="profile-label">Name:</label>
      <input id="pname" type="text" placeholder="Enter your full name" style="flex: 1;">
    </div>

    <div style="display: flex; align-items: center; margin: 10px 0;">
      <label class="profile-label">Phone No:</label>
      <input id="pphone" 
       type="text" 
       maxlength="10" 
       placeholder="Enter 10-digit mobile number"
       oninput="this.value=this.value.replace(/[^0-9]/g,'')"
       style="flex: 1;">
    </div>

    <div style="display: flex; align-items: center; margin: 10px 0;">
      <label class="profile-label">Address:</label>
      <input id="paddress" type="text" placeholder="Enter your address" style="flex: 1;">
    </div>

    <button onclick="saveEditedProfile()" style="width: 48%; margin-top: 10px;">
      Save
    </button>

    <button onclick="cancelEditProfile()" style="width: 48%; margin-top: 10px;">
      Back
    </button>

    <p id="pmsg" class="msg"></p>
  </div>

</div>

<script type="module" src="script.js"></script>

</body>
</html>
